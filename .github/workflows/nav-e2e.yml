name: Nav E2E

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/nav-e2e.yml'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'prisma/**'
      - 'src/app/_components/nav-*.tsx'
      - 'src/app/_components/app-shell.tsx'
      - 'src/app/_components/topbar.tsx'
      - 'src/app/_components/command-palette.tsx'
      - 'src/app/login/page.tsx'
      - 'src/app/register/page.tsx'
      - 'src/app/_components/preset-modal.tsx'
      - 'src/server/auth/**'
      - 'tests/e2e/**'
  pull_request:
    paths:
      - '.github/workflows/nav-e2e.yml'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'prisma/**'
      - 'src/app/_components/nav-*.tsx'
      - 'src/app/_components/app-shell.tsx'
      - 'src/app/_components/topbar.tsx'
      - 'src/app/_components/command-palette.tsx'
      - 'src/app/login/page.tsx'
      - 'src/app/register/page.tsx'
      - 'src/app/_components/preset-modal.tsx'
      - 'src/server/auth/**'
      - 'tests/e2e/**'
  workflow_dispatch:

jobs:
  nav-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: studyforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d studyforge_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      AUTH_SECRET: test-auth-secret-32-chars-minimum
      NEXTAUTH_URL: http://127.0.0.1:3000
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/studyforge_test
      GROQ_API_KEY: test-groq-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Prisma schema
        run: npx prisma db push

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run nav e2e spec
        run: npx playwright test tests/e2e/nav-auth.spec.ts

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-nav-e2e-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore